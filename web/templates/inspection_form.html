<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Inspection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contianer">
        <div class="header">
            <div>
                <h1>New Inspection</h1>
               {% include "partials/navbar.html" %}
            </div>
        </div>

        <div class="card">
            <form method="POST">

                <h2>{{ machine.make }} {{ machine.model }}</h2>
                <p class="muted">Serial: {{ machine.serial_number }}</p>
                <h2>Checklist</h2>

                <table>
                    <tr>
                        <th>Item</th>
                        <th>Description</th>
                        <th>Pass</th>
                        <th>Fail</th>
                    </tr>

                    {% for item in checklist_items %}
                        <tr>
                            <td>{{ item.name }}</td>
                            <td>{{ item.description }}</td>
                            <td>
                                <input type="radio"
                                        name="item_{{ item.master_item_id }}"
                                        value="pass"
                                        required
                                        >
                            </td>
                            <td>
                                <input type="radio"
                                        name="item_{{ item.master_item_id }}"
                                        value="fail"
                                        >
                            </td>
                        </tr>
                    {% endfor %}
                </table>

                <br>

                <label><strong>Inspection Notes</strong></label>
                <br>

                <textarea name="notes"
                        rows="5"
                        style="width: 100%;"></textarea>
                
                <br><br>

                <button type="submit" class="primary">
                    Submit Inspeciton
                </button>
            </form>
        </div>
    </div>
</body>
</html>
